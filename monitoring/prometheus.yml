global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'vidport-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:5000']

  - job_name: 'vidport-scraper'
    static_configs:
      - targets: ['scraper:8000']

  - job_name: 'vidport-processor'
    static_configs:
      - targets: ['processor:8000']
