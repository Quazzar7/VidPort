name: Docker Build and Push

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/vidport-backend:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/vidport-backend:${{ github.sha }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/vidport-frontend:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/vidport-frontend:${{ github.sha }}

      - name: Build and push Scraper image
        uses: docker/build-push-action@v5
        with:
          context: ./services/scraper
          file: ./services/scraper/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/vidport-scraper:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/vidport-scraper:${{ github.sha }}

      - name: Build and push Processor image
        uses: docker/build-push-action@v5
        with:
          context: ./services/processor
          file: ./services/processor/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/vidport-processor:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/vidport-processor:${{ github.sha }}

      - name: Build and push Insight Generator image
        uses: docker/build-push-action@v5
        with:
          context: ./services/insight-generator
          file: ./services/insight-generator/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/vidport-insight-generator:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/vidport-insight-generator:${{ github.sha }}
