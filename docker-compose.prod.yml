services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vidport}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password}
    volumes:
      - minio_data:/data

  backend:
    image: ghcr.io/quazzar7/vidport-backend:latest
    depends_on:
      - db
      - redis
      - minio
    environment:
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=${POSTGRES_DB:-vidport};Username=${POSTGRES_USER:-admin};Password=${POSTGRES_PASSWORD:-password}
      Redis__Connection: redis:6379
      S3Options__ServiceUrl: http://minio:9000
      S3Options__AccessKey: ${MINIO_ROOT_USER:-admin}
      S3Options__SecretKey: ${MINIO_ROOT_PASSWORD:-password}
    ports:
      - "5001:5000"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  scraper:
    image: ghcr.io/quazzar7/vidport-scraper:latest
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      ADZUNA_APP_ID: ${ADZUNA_APP_ID:-}
      ADZUNA_APP_KEY: ${ADZUNA_APP_KEY:-}
    restart: unless-stopped

  processor:
    image: ghcr.io/quazzar7/vidport-processor:latest
    depends_on:
      - kafka
      - db
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      DB_DSN: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-vidport}
    restart: unless-stopped

  insight-generator:
    image: ghcr.io/quazzar7/vidport-insight-generator:latest
    depends_on:
      - db
    environment:
      DB_DSN: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-vidport}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    restart: unless-stopped

  frontend:
    image: ghcr.io/quazzar7/vidport-frontend:latest
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5001
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  minio_data: