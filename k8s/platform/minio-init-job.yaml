apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-bucket
  namespace: platform
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-minio
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z minio.platform.svc.cluster.local 9000; do
                echo "waiting for minio..."; sleep 3;
              done
      containers:
        - name: mc
          image: minio/mc:latest
          command:
            - sh
            - -c
            - |
              mc alias set myminio http://minio.platform.svc.cluster.local:9000 admin vidport_pass
              mc mb --ignore-existing myminio/videos
              mc anonymous set public myminio/videos
              echo "Bucket ready."
