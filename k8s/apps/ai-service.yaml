apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-service-config
  namespace: apps
data:
  OLLAMA_BASE_URL: "http://host.k3d.internal:11434"
  OLLAMA_MODEL: "llama3"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: ghcr.io/quazzar7/vidport-ai-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ai-service-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: apps
spec:
  selector:
    app: ai-service
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
