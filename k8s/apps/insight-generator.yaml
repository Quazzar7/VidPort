apiVersion: v1
kind: Secret
metadata:
  name: insight-generator-secrets
  namespace: apps
type: Opaque
stringData:
  DB_DSN: "postgresql://admin:vidport_pass@postgres.platform.svc.cluster.local:5432/vidport"
  OLLAMA_BASE_URL: "http://host.k3d.internal:11434"
  OLLAMA_MODEL: "llama3"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: insight-generator
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: insight-generator
  template:
    metadata:
      labels:
        app: insight-generator
    spec:
      containers:
        - name: insight-generator
          image: ghcr.io/quazzar7/vidport-insight-generator:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: insight-generator-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
