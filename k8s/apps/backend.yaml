apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: apps
data:
  ASPNETCORE_ENVIRONMENT: Production
  ASPNETCORE_URLS: http://+:5000
  Kafka__BootstrapServers: kafka.platform.svc.cluster.local:9092
  Cors__AllowedOrigins: "http://vidport.local;http://localhost:3000"
  AiService__BaseUrl: "http://ai-service.apps.svc.cluster.local:8000"
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: apps
type: Opaque
stringData:
  ConnectionStrings__DefaultConnection: "Host=postgres.platform.svc.cluster.local;Port=5432;Database=vidport;Username=admin;Password=vidport_pass"
  Redis__ConnectionString: "redis.platform.svc.cluster.local:6379"
  S3__ServiceUrl: "http://minio.platform.svc.cluster.local:9000"
  S3__AccessKey: "admin"
  S3__SecretKey: "vidport_pass"
  S3__BucketName: "videos"
  JwtOptions__SecretKey: "vidport_local_dev_secret_key_min32chars"
  JwtOptions__Issuer: "VidPort"
  JwtOptions__Audience: "VidPort"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: /metrics
    spec:
      containers:
        - name: backend
          image: ghcr.io/quazzar7/vidport-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: apps
spec:
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 5000
  type: ClusterIP
