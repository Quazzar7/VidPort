apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: apps
data:
  ASPNETCORE_ENVIRONMENT: Production
  ASPNETCORE_URLS: http://+:5000
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: apps
type: Opaque
stringData:
  ConnectionStrings__DefaultConnection: "Host=postgres.platform.svc.cluster.local;Port=5432;Database=vidport;Username=admin;Password=CHANGE_ME"
  Redis__ConnectionString: "redis.platform.svc.cluster.local:6379"
  S3__ServiceUrl: "http://minio.platform.svc.cluster.local:9000"
  S3__AccessKey: "CHANGE_ME"
  S3__SecretKey: "CHANGE_ME"
  S3__BucketName: "videos"
  JwtOptions__SecretKey: "CHANGE_ME_MIN_32_CHARS_LONG_SECRET"
  JwtOptions__Issuer: "VidPort"
  JwtOptions__Audience: "VidPort"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/quazzar7/vidport-backend:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: apps
spec:
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 5000
